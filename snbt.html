<script>

/*  https://ae2.jubnl.ch/ <-- Thanks you, you where the inspiration on where to start*/

// ========== CONSTANTS ==========
const byId = id => document.getElementById(id);
const DEBUG = new URLSearchParams(location.search).has('debug') &&
              new URLSearchParams(location.search).get('debug') !== '0';
const page = {};
const chapters = [];
const rewards_loot = [];
let curQuest = undefined;
let curChap = undefined;
let allQuest = {};
//const svg = document.getElementById("svg");
const select = byId("langSelect");
const showTree = byId("showTree");
const questoverlay = byId("questoverlay");
const ImgMap = new Map();


const availLang = [];
let splitlang = false;

const questColors = {
	quest_fill:'#6e6e6e', 
	quest_font:'#f00',
	quest_gradient_start:'#b5b5b5',
	quest_gradient_end:'#6e6e6e'
};

// ========== GENERAL START AND LOADING ==========
/*
/ Load ZIP files and simple SNBT and gather infos 
/ to fill the basic layout
/ 
/ @input : files
/ @use : page
*/
async function loadFiles(files) { 
	write_message("Loading files",8);
    const zips = [], plains = [];
    for (const f of files) (f.name.toLowerCase().endsWith('.zip') ? zips : plains).push(f); 

    /* FOR SINGLE FILE */
    for (const f of plains) {
        const text = await f.text();
		if (f.name.endsWith('.snbt')) page[f.name] = processSNBT(text);
    }

    /* FOR ZIP FILES */
    for (const f of zips) {
        const zip = await JSZip.loadAsync(f);
        for (const [p, e] of Object.entries(zip.files)) {
            if (!e.dir && /^.+ftbquests\/quests\/(.*)\.snbt$/i.test(p)) {
                if (DEBUG) {
					console.log("New quest config found : " + p);
				}
                const text = await e.async('string');
                page[p] = processSNBT(text,p);
            }
			if (!e.dir && /\.(?:png|jpe?g|gif|webp)/i.test(p)) {
					e.async('base64').then(function (base64) {
						let mime = detectMimeType(base64)
						if (mime) {
							ImgMap.set(getResourceLocation(p), "data:" + mime + ";charset=utf8;base64," + base64);
						}
					});
				//					}
			}
        }
       
    }
    write_message("Getting languages and showing chapters",2);
	// Get lang, set availLang and splitlang
	getlanguages();
	// Gather lootreward in array.
	process_LootRewards();
	// Get Chapter
	showchapters();
	// unlock config
	byId("controlshide").style.display = "inline";

}


/*
/ Gather languages from the parsed config files
/ and put them in the selector
/ 
/ @input : onload
/ @use : page, select
/ @set: availLang
*/
function getlanguages() {
	let values = {};
	for (key of Object.keys(page)) {
		let langregex = /\/(\w{2}_\w{2})(?:.snbt|\/)/;
		if (langregex.test(key)) {
			let result = key.match(langregex);
			if (result) {
				//console.log(result);
				if (availLang.includes(result[1])) {
					splitlang = true;
				} else {
					availLang.push(result[1]);
					values[result[1]] = key;
				}
			}
		}
	}
	for (const langKey of availLang) {
		const opt = document.createElement("option");
		opt.innerText = langKey
		if (langKey === "en_us") {
			opt.selected = true;
		}
		if (splitlang) {
			opt.value = langKey;
		} else {
			opt.value = values[langKey];
		}
		select.appendChild(opt);
	}
}

/*
/ Fill array of const rewards_loot to associate id to reward tables
/
/ 
/ @input : on_loadFiles()
/ @use : page, rewards_loot
*/
function process_LootRewards() {
	for (key of Object.keys(page)) {
		if (/\/reward_tables\/.*/.test(key)) {
			if (page[key] instanceof Array) {
				for (reward in page[key]) {	
					rewards_loot[reward.id] = reward;
				}
			} else {
				rewards_loot[page[key].id] = page[key];
			}
		}
	}
	if (DEBUG) {
		console.log(rewards_loot);
	}
}

/*
/ Show chapters form the parsed config file 
/ and put them in the <ul>
/ 
/ @input : onload
/ @use : page, chapters
*/
function showchapters() {
	//get pack name
	getName();
	// Building groups
	let groups = document.getElementById("groups");
	for (key of Object.keys(page)) {
		if (/chapter_groups.snbt/.test(key)) {
			for (chapter of page[key].chapter_groups) {
				//console.log(chapter);
				groups.appendChild(addToDom("li", getLang("chapter_group", chapter.id, "title", key) , "group_quest", chapter.id));
			}
		}
	}
	// Adding chapter 
	for (key of Object.keys(page)) {
		if (/quests\/chapters/gimv.test(key)) {
			chapters.push(page[key]);
			if ("group" in page[key]) {
				chaptergroup = page[key].group
				obj = document.getElementById(chaptergroup);
			} else {
				obj = groups
			}
			let child = obj.appendChild(addToDom("li", getLang("chapter",page[key].id,"title", key), "quest", key, null, null, null, " order:" + page[key].order_index + ";"));  //element, text, className, Id, title, src, alt, style)
			child.addEventListener('click', function() {
				chapter_click(this.id);
			});
			///populate quest name
			for (const quest of page[key].quests) {
				title = getLang("quest", quest.id, "title", key);
				if (title) {
					allQuest[quest.id] = { "formated": title, "raw":title.textContent, "filepath":key }; 
				} else {
					allQuest[quest.id] = { "formated": quest.id, "raw":"", "filepath":key }; 
				}
			}
			byId("search").style.display = "block";
		}
	}
	chapters.sort(function( a, b) {
		return a.group - b.group || a.order_index - b.order_index
	});
	//console.log(chapters);
	
}

/*
/ Get Lang string from the parsed SNBT files
/ should support multilang separated files
/ 
/ @input : file_path
/ @use : page, select
/
*/
function getLang(filetype, id, type, filepath, solo) {
	const lang = select.options[select.selectedIndex];
	let objName = "";
	let simplepath = "";
	let simpledefault = ""
	let retour = []
	if (splitlang) {
		if (typeof solo === "undefined") {
			simplepath = filepath.replace(/\/quests\/(.*)(\/.*)?/gimv, "\/quests\/lang\/"+ lang.value +"\/$1" )
			simpledefault = filepath.replace(/\/quests\/(.*)(\/.*)?/gimv, "\/quests\/lang\/en_us\/$1" ) // set 	below as whel if default is not en_us
			let defaultchap = simplepath.replace(/(.*\/)(.*\/)(.*)(\..*)/gimv, "$1chapter$4");
			simplepath = simplepath.replace(/chapter_groups/gimv, "chapter_group"); // not named the same, bug probably
			if (type === undefined) { // && DEBUG
				objName = filetype + "." + id;
				for (const key in page[simplepath]) {
					if (key.includes(objName)) {
						retour.push({"key":key, "text":page[simplepath][key], "path": simplepath});
					}
				}
				for (const key in page[defaultchap]) {
					if (key.includes(objName)) {
						retour.push({"key":key, "text":page[defaultchap][key], "path": defaultchap});
					}
				}
				for (const key in page[simpledefault]) {
					if (key.includes(objName) && lang.value !== 'en_us') {
						retour.push({"key":key, "text":page[simpledefault][key], "path": simpledefault});
					}
				}
				return retour;
			} else {
				objName = filetype + "." + id + "." + type
				if (page[simplepath] !== undefined) {
					if (page[simplepath][objName] !== undefined) {
						retour.push(page[simplepath][objName]);
					}
				} 
				if (page[defaultchap] !== undefined) {
					if (page[defaultchap][objName] !== undefined) {
						retour.push(page[defaultchap][objName]);
					}
				} 
				if (page[simpledefault] !== undefined) {
					if (page[simpledefault][objName] !== undefined  && lang.value !== 'en_us') {
						retour.push(page[simpledefault][objName]);
					}
				}
				return SNBT_Text(retour.join('\n'));
			}
		} else {
			simplepath = filepath.replace(/\/quests\/(.*)(\/.*)?/gimv, "\/quests\/lang\/" + lang.value + "\/" + solo );
			simpledefault = filepath.replace(/\/quests\/(.*)(\/.*)?/gimv, "\/quests\/lang\/en_us\/" + solo );
			simplepath = simplepath.replace(/chapter_groups/gimv, "chapter_group"); // not named the same, bug probably
			objName = filetype + "." + id + "." + type
			if (page[simplepath] !== undefined) {
				return SNBT_Text(page[simplepath][objName]);
			} 
			if (page[simpledefault] !== undefined) {
				return SNBT_Text(page[simpledefault][objName]);
			}
		}
	} else {
		simplepath = lang.value
		let re = new RegExp(String.raw`/${lang.text}`, "giv");
		let defaultpath = simplepath.replace(re, "/en_us");
		if (type === undefined) { // && DEBUG
			objName = filetype + "." + id 
			for (const key in page[simplepath]) {
				//console.log(key);
				if (key.includes(objName)) {
					retour.push({"key":key, "text":page[simplepath][key]});
				}
			}
			return retour;
		} else {
			objName = filetype + "." + id + "." + type
			if (page[simplepath][objName] !== undefined) {
				if (page[simplepath][objName] instanceof Array) {
					return SNBT_Text(page[simplepath][objName].join('\n'));
				} else {
					return SNBT_Text(page[simplepath][objName]);
				}
			}
			if (page[defaultpath][objName] !== undefined) {
				if (page[defaultpath][objName] instanceof Array) {
					return SNBT_Text(page[defaultpath][objName].join('\n'));
				} else {
					return SNBT_Text(page[defaultpath][objName]);
				}
			}
		}
	}
} 

/*
/ SVG is poor in text content, just text no html in it so we strip everything
/ simple wrapper for the above function
/
/ 
/ @input : filetype, id, type, filepath
/
*/
function SNBTinSvg(filetype, id, type, filepath) {
	let string = getLang(filetype, id, type, filepath);
	return string.textContent;
}

/*
/ Get Pack name from lang file and set it
/ and put them in the div
/ 
/
/ @use : byId
*/
function getName() {
	let infos = byId("packtitle")
	infos.innerHTML = "";
	infos.appendChild(addToDom("h1", getLang("file", "0000000000000001", "title", Object.keys(page)[5], "file.snbt")));
	infos.parentElement.style.display = "inline";
}

/*
/ Set Chapter name from lang file
/ and put them in the div
/ 
/
/ @use : byId
*/
function setChapName(chapname) {
	let infos = byId("chaptertitle")
	infos.innerHTML = "";
	infos.appendChild(addToDom("h2", chapname));
}
// ========== USER INPUT STUFF ==========

/*
/ On click of a chapter this draw the image.
/ and put it in the <div svg>
/ @define : curChap
/ 
/ @input : id
/ @use : page
*/
async function chapter_click(id) {
	write_message("Rendering Quest, loading images take a while" ,5)
	closequest();
	curChap = page[id];
	setChapName(getLang("chapter",curChap.id,"title", id));
	curChap.filepath = id;
	var svgSize = 10000;
	svg.innerHTML = "";
	const frag = new SVG.Fragment()
	const group = frag.group()
	const sizem = 30
	const spacem = 60
	if (curChap.images) {
		for (const image of curChap.images) {
			let b64 = ImgMap.get(image.image);
			//console.log(b64);
			let height = SNBT_Values(image.height ?? "1") * sizem;
			let width = SNBT_Values(image.width ?? "1") * sizem;
			let rotation = SNBT_Values(image.rotation ?? "0");
			let bg = group.image(null).attr({"href":b64, "width":width, "height":height});

/*
/ On the click of a quest, call the overlay a fill it with info
/ @define : curQuest
/ 
/ @input : on_click
/ @use : page, curChap, questoverlay
*/
function quest_click(id) {
	if (typeof this.id !== "undefined") {
		_id = this.id;
	} else {
		_id = id;
	}
	curQuest = curChap.quests.filter((arr) => arr.id === _id)[0];
	console.log(curQuest);

	for (const line in page) {
		if (page[line].id === curChap.id) {
			curQuest.filepath = line;
			break;
		}
	}
	let domQuest = byId("quest");
	domQuest.innerHTML = ""
	unlink_hilight();
	//dependencies
	if (curQuest.dependencies) {
		let deps = [];
		for( const dep_key of curQuest.dependencies) {
			let linked_quest = allQuest[dep_key];
			let opt = false;
			if (linked_quest.filepath === curQuest.filepath) {
				if (linked_quest.raw.length === 0 ) {
					opt = addToDom("option", dep_key, "quest_deps_link")
				} else {
					opt = addToDom("option", linked_quest.formated, "quest_deps_link")
				}
			} else {
				let txt = addToDom("span");
				if (linked_quest.raw.length === 0 ) {
					txt.appendChild(dep_key);
				} else {
					txt.appendChild(linked_quest.formated);
				}
				txt.appendChild(addToDom("p", "[" + page[linked_quest.filepath].id + "]")); 
				opt = addToDom("option", txt , "quest_deps_link")
			}
			if (opt) {
				deps.push(opt);
				opt.addEventListener('click', (evt) => open_quest(dep_key, linked_quest.filepath, evt));
			}
		}
		domQuest.append(addToDom("select", deps, "quest_dependencies"));
	}
	//Title
	if (getLang('quest',curQuest.id, 'title', curQuest.filepath) !== undefined) { 
			domQuest.append(addToDom("h1",getLang('quest',curQuest.id, 'title', curQuest.filepath)));
	}
	// Tasks
	if (curQuest.tasks) {
		domQuest.append(addToDom("div",getTasks(curQuest.tasks),"tasks"));
	}
	// Rewards
	if (curQuest.rewards) {
		domQuest.append(addToDom("div",getRewards(curQuest.rewards),"rewards"));
	}
	// Subtitle
	if (getLang('quest',curQuest.id, 'subtitle', curQuest.filepath) !== undefined) { 
			domQuest.append(addToDom("h2",getLang('quest',curQuest.id, 'subtitle', curQuest.filepath)));
	}
	// Quest desc
	if (getLang('quest',curQuest.id, 'quest_desc',  curQuest.filepath) !== undefined) {
		domQuest.append(addToDom("p",getLang('quest',curQuest.id, 'quest_desc',  curQuest.filepath), "quest_desc"));
	}
	if (DEBUG) {
		domQuest.append(addToDom("pre",JSON.stringify(curQuest, null, 2)));
		domQuest.append(addToDom("pre",JSON.stringify(getLang('quest',curQuest.id, undefined, curQuest.filepath), null, 2)));
	}
	link_tree(curQuest.id);
	questoverlay.style.display="block"
	window.addEventListener('mouseup', clickout);
}

function open_quest(quest, filepath, evt) {
	if (curChap.filepath !== filepath) {
		chapter_click(filepath);
	}
	quest_click(quest);
	byId("searchresult").innerHTML = ""
}

function search_quest() {
	const result = byId("searchresult");
	const input = byId("searchbox").value
	const search = new RegExp(RegExp.escape(input), "i")

	result.innerHTML = ""
	if (input.length > 2) {
		for (const [key, quest] of Object.entries(allQuest)) {
			let retour = false; 
			if (quest.raw.search(search) > 0) {
				retour = result.appendChild(addToDom("p", quest.formated));
			}
			if (key.search(search) > 0) {
				retour = result.appendChild(addToDom("p", quest.formated));
			}
			if (retour) {
				retour.addEventListener('click', (evt) => open_quest(key, quest.filepath, evt));
			}
		}
		
	}
}
/*
/ Get linked quest or the whole tree 
/
/ 
/ @input : quest_id(from), bool getChild
/ @use : showTree
*/
function link_tree(from, getChild = true) {
	const list = document.getElementsByClassName(from);
	if (list.length > 0) {
		for (const line of list) {
			let attrs_ = line.classList;
			if (!attrs_.contains("quest_link_hl")) {
				if (attrs_.contains(from)) {
					if (attrs_[0] === from) {
						attrs_.add("quest_link_hl");
						if (showTree.checked) {
							link_tree(attrs_[1], false);
						}
					} else if (attrs_[1] === from) {
						if (getChild) {
							attrs_.add("quest_link_hl");
						}
						
					}
				}
			}
		}
	}
}

/*
/ Unmark linked quest or the whole tree (recursive because they stick)
/
/ 
/ @input : on_ 
/ @use : showTree
*/
function unlink_hilight() {
	const list = document.getElementsByClassName('quest_link_hl');
	if (list.length > 0) {
		for (const line of list) {
			//1 
			let attrs = line.classList;
			while (attrs.contains("quest_link_hl")) {
				attrs.remove("quest_link_hl");
			}
		}
	unlink_hilight();
	}
	
}

function closequest() {

function clickout(event) {
    if (event.target !== questoverlay && !questoverlay.contains(event.target)) {
		questoverlay.style.display="none"
		window.removeEventListener("mouseup", clickout);
	}
}

/*

/ 
/ 
/ @input : tasks
*/
function getTasks(tasks) {
	let out = [];
	out.push(addToDom("h3", "Tasks","tasks_title"));
	for ( const task of tasks) {
		switch(task.type) {
			case 'item' :
				if (task.item.components) {
					out.push(addToDom("abbr", task.item.count + " x " + task.item.id, "task_item",null ,JSON.stringify(task.item.components,null,2)));
				} else {
					out.push(addToDom("p", task.item.count + " x " + task.item.id, "task_item", task.id)); 
				}
				break;
			case 'xp' :
				out.push(addToDom("p", "Collect " + task.xp + " xp", "task_xp", task.id)); 
				break;
			case 'advancement' :
				out.push(addToDom("p", task.advancement, "task_advancement", task.id)); 
				break;
			case 'kill' :
				out.push(addToDom("p", "Kill " + SNBT_Values(task.value) + " x " + task.entity, "task_kill", task.id)); 
				break;
			case 'checkmark' :
				out.push(addToDom("p", "Checkmark", "task_checkmark", task.id)); 
				break;
			case 'custom' :
				out.push(addToDom("pre", JSON.stringify(task,null, 2), "task_custom", task.id)); 
				break;
			case 'xp_levels' :
				out.push(addToDom("p", "Collect " + task.xp_levels + "level of xp", "task_xp_level", task.id)); 
				break;
			case 'dimension' :
				out.push(addToDom("p", "Travel to " + task.dimension , "task_dimension", task.id)); 
				break;
			case 'stat' :
				out.push(addToDom("p", "Reach or exceed " + task.statistic, "task_stat", task.id)); 
				break;
			case 'location' :
				out.push(addToDom("p", "Travel to " + task.location , "task_location", task.id)); 
				break;
			case 'observation' :
				out.push(addToDom("p", "Observe this block/entity" + task.block , "task_observation", task.id)); 
				break;
			case 'biome' :
				out.push(addToDom("p", "Travel to " + task.biome , "task_biome", task.id)); 
				break;
			case 'structure' :
				out.push(addToDom("p", "Find a " + task.structure , "task_structure", task.id)); 
				break;
			case 'stage' :
				out.push(addToDom("p", "Game stages " + task.stage , "task_structure", task.id)); 
				break;
			case 'fluid' :
				out.push(addToDom("p", "Obtain fluid " + task.structure , "task_structure", task.id)); 
				break;
			case 'forge_energy' :
				out.push(addToDom("p", "Generate " + SNBT_Values(task.value) + " amount of Forge Energy" , "task_structure", task.id)); 
				break;
			default :
				console.log("Task type Unknown : " + task.type);
				break;
		}
	}
	return out;
}

/*
/ Same as above for rendering Rewards of a quest
/ Thanks to the stranger mentionned below for the dec2hex function (voodoo magic)
/
/ 
/ @input : rewards
/ @use : rewards_loot, curQuest
*/
function getRewards(rewards) {
	let out = [];
	out.push(addToDom("h3", "Rewards","rewards_title"));
	for ( const reward of curQuest.rewards) {
		switch(reward.type.trim()) {
			case 'item' :
				out.push(addToDom("p", reward.item.count + " x " + reward.item.id, "reward_item", reward.id)); 
				break;
			case 'xp' :
				out.push(addToDom("p", reward.xp + " xp", "reward_xp", reward.id)); 
				break;
			case 'random' :
				let table_id = dec2hex(SNBT_Values(reward.table_id)).toUpperCase().padStart(16, "0");
				out.push(lootTables(rewards_loot[table_id], null ,table_id));
				//out.push(addToDom("pre", JSON.stringify(rewards_loot[table_id],null, 2), "reward_rand", table_id));
				break;
			case 'loot' :
				let loot_id = dec2hex(SNBT_Values(reward.table_id)).toUpperCase().padStart(16, "0");
				out.push(lootTables(rewards_loot[loot_id],null,  loot_id));
				//out.push(addToDom("pre", JSON.stringify(rewards_loot[loot_id],null, 2), "reward_loot", loot_id));
				break;
			case 'xp_levels' :
				out.push(addToDom("p", reward.xp_levels + " xp level", "reward_xp_level", reward.id)); 
				break;
			case 'choice' :
				let choice_id = dec2hex(SNBT_Values(reward.table_id)).toUpperCase().padStart(16, "0");
				out.push(lootTables(rewards_loot[choice_id],'choice', choice_id));
				break;
			case 'all' :
				let all_id = dec2hex(SNBT_Values(reward.table_id)).toUpperCase().padStart(16, "0");
				out.push(lootTables(rewards_loot[all_id],'all', all_id));
				break;
			case 'command' :
				if (typeof reward.feedback_message !== "undefined" ) {
					out.push(addToDom("p", "Play a command to say : " + reward.feedback_message , "reward_command", reward.id)); 
				} else {
					// Silent Command
					//out.push(addToDom("p", reward.command , "reward_command", reward.id)); 
				}
				break;
			case 'custom' :
				out.push(addToDom("pre", JSON.stringify(reward, null, 2) , "reward_custom", reward.id)); 
				break;
			case 'toast' :
				out.push(addToDom("p", reward.toast , "reward_toast", reward.id)); 
				break;
			case 'stage' : // probably the same as below
				out.push(addToDom("p", "Grants stage " + reward.stage , "reward_stage", reward.id)); 
				break;
			case 'gamestage' :
				out.push(addToDom("p", "Grants stage " + reward.stage , "reward_stage", reward.id)); 
				break;
			default :
				console.log("Reward type Unknown : " + reward.type);
				break;
		}
	}
	return out;
}

/*
/ Get Associated loot tables of the overlayed quest, call by the two above function 
/ this render and calculate the chances of each item.
/ 
/ @input : reward_loot_id
/ @use : curQuest
*/
function lootTables(reward_loot, weights = undefined, loot_id) {
	let class_ = '';
	if (weights) {
		if (weights === "choice") {
			class_ = "choice"
		}
		if (weights === "all") {
			class_ = "all"
		}
	} else {
		class_ = "loot"
	}
	let out = addToDom("div", "", "reward_" + class_);
	let total = 0, nb = 0;
	let arr = [];
	if (getLang('reward_table',loot_id, 'title',  curQuest.filepath, "reward_table.snbt") !== undefined) {
		out.append(addToDom("p",getLang('reward_table',loot_id, 'title',  curQuest.filepath, "reward_table.snbt"), "reward_table"));
	}
	for ( const reward_key in reward_loot.rewards) {
		const reward = reward_loot.rewards[reward_key]
		var count = SNBT_Values(reward.count ?? "1");
		var weight = SNBT_Values(reward.weight ?? "1");
		var bonus = reward.random_bonus ?? 1;
		total += count * weight;
		nb++;
		let number = ''
		if (bonus > 1) {
			number = count + "-" + count * bonus
		} else {
			number = reward.item.count
		}
		var string = number + " x " + reward.item.id
		arr.push({"count" : count, "weight" : weight, "string" : string, "total" : count * weight, "id" : reward_loot.id});
		
	}
	for (const arrkey in arr) {
		const reward = arr[arrkey];
		let complement = "";
		if (weights) {
			switch (weights) {
				case  'choice' :
					complement = " [choice]";
				break;
				case 'all' :
					complement = " [100%]";
				break;
			}
		} else {
			complement = " [" + Math.round((reward.total / total) * 1000)/10 + "%]"
		}
		out.append(addToDom("p", reward.string + complement, reward.id));
	}
	return out;
}

/*
/ Helper wrapper to document.createElement
/
/ 
/ @input : html_elem, text, className, id, title
/
*/
function addToDom(element, text, className, Id, title, src, alt, style) {
	let classNam = (typeof className === 'undefined') ? null : className;
	let Id_ = (typeof Id === 'undefined') ? null : Id;
	let text_ = (typeof text === 'undefined') ? null : text;
	let title_ = (typeof title === 'undefined') ? null : title;
	let src_ = (typeof src === 'undefined') ? null : src;
	let alt_ = (typeof alt === 'undefined') ? null : alt;
	let style_ = (typeof style === 'undefined') ? null : style;
	const elem = document.createElement(element);
	if (text) {
		if (text instanceof Object) {
			if (text instanceof Array) {
				for (tex in text) {
					elem.appendChild(text[tex]);
				}
			} else {
				elem.appendChild(text);
			}
		} else {
			elem.innerText = text;
		}
	}
	if (classNam) { 
		elem.className = classNam;
	}
	if (Id_) {
		elem.id = Id_;
	}
	if (title_) {
		elem.setAttribute("title",title_);
	}
	if (src_) {
		elem.setAttribute("src",src_);
	}
	if (alt_) {
		elem.setAttribute("alt",alt_);
	}
	if (style_) {
		elem.setAttribute("style",style_);
	}
	return elem;
}

				let formated = formatter.format(line)
				let removeRegex = /(\{(?:\{.*\}|[^\{])*?\})/gm

					//console.log(" matched inline Rich text : " + line);
					let futursplit = line.replace(removeRegex, '\\nUBERIMPROBABLESTRING\\n');
					let inlinemulti = futursplit.split(/\\n/gmiv);
					let n = 0;
					let inlinematch = line.match(removeRegex);
					for (const inline of inlinemulti) {

							let richinline = formatRichEditor(inlinematch[n])

								elems.appendChild(richinline);

							n++;
						} else {
							elems.appendChild(formatter.format(inline));
						}
						elems.appendChild(addToDom("br"));
					}
					
				} else {
					elems.appendChild(formatter.format(line));
				}
			}
			elems.appendChild(addToDom("br"));
		}
	} else {
		if (unescaped.startsWith("[") || unescaped.startsWith("{\\") ) {

function formatTextComponenent(input) {
	input = input.replace(/\\{1,4}/g,'')
	let json = JSON.parse(input);
	
	function returnSpan(json) {
		let classlist = "";
		let style = "";
		let text = "";
		let click = undefined;
		let hover = undefined;
		if (json instanceof Object) {
			for (const key of Object.keys(json)) {
				// If its just text
				if (key === "text") {
					text += json.text;
					continue;
				}
				// If theres a class or anything to add
				let authorized = ["bold","italic","underlined","strikethrough","obfuscated","color"] 
				if (authorized.includes(key)) {
					if (json[key] instanceof String) {
						if (json[key].startsWith('#')) {
							style = " color:" + json[key] + ";";
							classlist += " mc-root";
						} else {
							classlist += " mc-" + json[key];
						}
					} else {
						classlist += " mc-" +key;
					}
					continue;
				}
				if (key === "clickEvent") {
				// TODO something
					
					if (json[key].action === "change_page") {
						click = (evt) => open_quest(json[key].value, allQuest[json[key].value].filepath, evt);
					} else {
						console.log("unknown click event" ,  json[key]);
					}
					continue;
				}
				if (key === "hoverEvent") {
				// TODO something
					if (json[key].action === "show_text") {
						hover = {"key":"data-tooltip","value": json[key].contents};
					} else {
						console.log("unknown hover event" ,  json[key]);
					}
					continue;
				}
				// Doit ne pas marcher, ca reroune un span.
				if (key === "extra") {
					for (const jsonExtra of json.extra) {
						text += formatTextComponenent(jsonExtra.stringify);
					}
				}
			}
		} else {
			text = json;
		}
		// Replace
		classlist = classlist.replace(/dark_acqua/gm, "dark_aqua");
		let out = addToDom('span', text, classlist, null, null, null, null, style);
		if (click) {
			out.addEventListener('click', click);
		} 
		if (hover) {
			out.setAttribute(hover.key, hover.value);
		}
		return out;
	}
	
	if (json instanceof Array) {
		let elems = addToDom('span');
		elems.classList.add("mc-root");
		for (const elem of json) {
			elems.appendChild(returnSpan(elem));
		}
		return elems;
	} else {
		return returnSpan(json);
	}
}

	return out;

/*
/ FTB SNBT PARSER for minecraft FTB.Library mod, or FTBQuest mod for minecraft(c)
/
/ Regex are split between config file and lang file, there are to mani intricate things
/ Regex are detailed below the function
/ Parser fails until it cannot process anymore with error one the processeced result but it should a leat console.log something
/
/ Files are from the mod Author, respect their copyright.
/ 
/ @input : ftb_snbt, filepath
/
*/
 function processSNBT(text,p) {
    let tokens = [];
    let sortie = {};
    for (line of text.split('\n')) {
        line = line.replaceAll('\t','').trim();
        //console.log(line);
        // ligne vide
        if (line === "") { continue; }
        // Comment
        if (line[0] === '#') { continue; }
        // good line
		if (/^.+\/lang\/.*$/i.test(p)) {
			tokens = tokens.concat(processlang(line));
		} else {
			tokens = tokens.concat(processLigne(line));
		}
    }

    if (tokens !== []) {
    var i = -1;

    function main() {
        let v = {};
        let temp = undefined
        while ( i++ < tokens.length - 1 ) {
	    var token = tokens[i][0].trim();
            if (i>=1) {
                var prev = tokens[i-1][0].trim();
            }
            if (i <= (tokens.length - 2) ) {
               var next = tokens[i+1][0].trim();
            }
            switch(token) {
            case "{" :
                //console.log("Nouvel Objet")
                if (i>=2) {
                    if (prev === ":" ) {
                        // Objet dans un objet
                        v[tokens[i-2][0].trim()] = main();
                        continue;
                    } 
                } 
				let obj = main();
				if ( Object.keys(v).length === 0 ) {
					if (i < (tokens.length - 2)) {
						if (tokens[i+1][0].trim() === "{") { //next is from past instance i as kept updating
							v = [obj];
						} else {
							v = obj;
						}
					} else {
						v = obj;
					}
				} else {
					if (v instanceof Array) {
						v.push(obj);
					} else {
						v = [v];
						v.push(obj);
					}
				}
                continue;
            case "}" :
                return v;
            case "[" :
                //console.log("debut array");
                if (prev === ":") {
                    var arrName = tokens[i-2][0].trim();
                }
                temp = main();
				if (arrName !== undefined) {
				     //console.log("ajout d'un objet dans array")
                    v[arrName] = [];
					if (temp instanceof Array) {
						v[arrName].push(...temp);
						temp = undefined;
					} else {
						if (Object.keys(temp).length !== 0) {
							v[arrName].push(temp);
							temp = undefined;
						}
					}
					continue;
				}
                continue;
            case "]" :
                if (arrName !== undefined) {
                    v[arrName] = temp;
                    return v;
                } else {
                    // array dans un array
					if (temp !== undefined) {
						if (Object.keys(v).length !== 0) {
							temp.push(v);
						}
						return temp;
					} else {
						return v;
					}
                }
			//osef
			case "," :
				continue;	
			case ":" :
				continue;
            // default 
            default:
				//si oui
				// le suivant est un ":" ?
				if (next !== ":")  {
					// si le suivant est un ","
					if (next === "," || next === "]" || prev === "[") {
						//si oui 
						if (prev !== ":") {
							// c'est une des valeurs de temp[] ?
							if (!temp) {
								temp = [];
							}
							temp.push(token);
							continue;
						}
						// ou c'est de la synthaxe perdue
						if (prev === ":") {
						// la virgule etait a la fin de la ligne
							v[tokens[i-2][0].trim()] = token;
							continue;
						}
					} else {
						//c'est la valeur de l'objet precedent
						//console.log("ajouter valeur")
						if (temp instanceof Array || temp instanceof Object ) {
							if (prev === ":") {
								// c'est un objet dans un array
								v[tokens[i-2][0].trim()] = token;
								continue;
							} else {
								// c'est une valeur simple
								temp.push(token);
								continue;
							}
						} else {
							// Clé valeur d'un objet
							if (token !== "" || tokens[i-2][0].trim() !== "" ) {
								v[tokens[i-2][0].trim()] = token;
							} else {
								if (DEBUG) {
									console.log("empty token : " + i + " token : " + prev + token + next + " ; fichier : " + p);
								}
							}
							continue;
						}
					}
				}

            }
		}
		if ((i) !== tokens.length && DEBUG ) {
			console.log(p + " unexpected end : " + tokens.length + " tokens mais i = " + i);
		}
		return v;
    }

    sortie = main();
    }
    return sortie;
}

/*
/ Regex to filter out all values (ranged to) and key as well as /;:.(){}\
/ This one is for config files
/ 
/ @input : text
/
*/
function processLigne(value) {
    const toks = value.matchAll(/(?:\+|-)?(?:\w+)(?:(?: |\/|;|:|\.|\)|\()(?:\w+|~|\+|\))(?:∞)?)*|(?: (?=\\"))|\{|\}|,|\[|\]|:/gv);
    return [...toks];
}

/*
/ Regex to filter out all values (ranged to) and key as well as /;:.(){}\
/ This one is for the lang files
/ 
/ @input : text
/
*/
function processlang(value) {
	const toks = value.matchAll(/(?<=").+(?=")|\{|\[| ?\}|\]|,|: |(?:\+|-)?[\w.;∞]+(?: ~ )?(?:(?:\+|-)?[\w;.∞]+)?|(?<=(?:\s"|\["))(?=")/gv);
	return [...toks];
}

function dec2hex(str){ // .toString(16) only works up to 2^53
    var dec = str.toString().split(''), sum = [], hex = [], i, s
    while(dec.length){
        s = 1 * dec.shift()
        for(i = 0; s || i < sum.length; i++){
            s += (sum[i] || 0) * 10
            sum[i] = s % 16
            s = (s - sum[i]) / 16
        }
    }
    while(sum.length){
        hex.push(sum.pop().toString(16))
    }
    return hex.join('')
}

        const lengthByChars = {};

    this.format = function (input) {

        const root = document.createElement("span");
        root.classList.add("mc-root"); // add class

        let content = [];

        let next = undefined; // the next element to append to root
        let active = root; // the last used element

        for (let i = 0; i < input.length; i++) {
            const current = input.charAt(i);

            if (current !== colorChar) {
                // not a color char, just push it
                content.push(current);
                continue;
            }

            const nextIndex = i + 1;

            if (nextIndex >= input.length) {
                // last character, just push it
                content.push(current);
                break;
            }

            const code = input.charAt(nextIndex);
            const format = COLORS[code];

            if (format) {
                const element = document.createElement("span");
                element.classList.add(`mc-${format.name}`);

                active.innerText = content.join(''); // set the content to the previous element
                content = []; // clear the content

                if (format.pass) {
                    active.appendChild(element);
                } else {
                    if (next !== undefined && next !== root) {
                        root.appendChild(next);
                    }
                    next = element;

                active = element;
                i++;

                && (nextIndex + 6 < input.length)) {

                for (let j = 0; j < 6; j++) {
                    const index = nextIndex + j + 1;
                    const char = input.charAt(index).toLowerCase();
                    const value = HEX_CHARS.indexOf(char);

                    if (value === -1) {
                        found = false;
                        break;
                    }

                    // push the color
                    color.push(char);
                }

                if (found) {
                    const element = document.createElement("span");
                    element.style.color = color.join('');
                    element.classList.add('mc-hex');

                    active.innerText = content.join(''); // set the content to the previous element
                    content = []; // clear the content

                    if (next !== undefined && next !== root) {
                        root.appendChild(next);
                    }
                    next = element;
                    active = element;
                    // process next
                    i = nextIndex + 6;
                }
            } else {
                // not a code, push
                content.push(current);
            }
        }

        // check for remaining content
        if (next !== undefined && next !== root) {
            root.appendChild(next);
        }

        if (content.length > 0) {
            active.innerText += content.join('');
        }

        return root;
